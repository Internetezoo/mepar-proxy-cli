<!DOCTYPE html>
<html>
<head>
    <title>NTA, MEPAR és HRSZ Térkép</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        body { margin: 0; padding: 0; }
        #map { width: 100%; height: 100vh; background: #e0e0e0; }
        
        .map-overlay {
            position: absolute; bottom: 20px; left: 10px; z-index: 1000;
            background: rgba(255,255,255,0.9); padding: 8px 12px;
            border-radius: 5px; font-family: sans-serif; font-size: 12px;
            border: 1px solid #ccc;
        }
        .warning { color: #d32f2f; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

<div id="map"></div>
<div class="map-overlay">
    <b>Aktuális Zoom:</b> <span id="zoom-level">12</span>
    <div id="hrsz-warn" class="warning">HRSZ: Nagyítson z15 szintig!</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const PROXY = 'https://mepar-proxy-cli.vercel.app/api';

    // 1. Térkép inicializálása
    const map = L.map('map').setView([47.16, 19.50], 12);

    // 2. FIX ALAP: CartoDB Szürke (Positron)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; CARTO'
    }).addTo(map);

    // 3. NTA
    const ntaLayer = L.tileLayer(`${PROXY}/nta?z={z}&x={x}&y={y}`, {
        minZoom: 8,
        opacity: 0.8,
        zIndex: 300
    }).addTo(map); // Alapértelmezett bekapcsolva

    // 4. MEPAR
    const meparLayer = L.tileLayer(`${PROXY}/tiles?LAYER=iier:topo10&FORMAT=image/png&TileMatrixSet=EPSG:3857&TileMatrix={z}&TileRow={y}&TileCol={x}`, {
        opacity: 0.6,
        zIndex: 200
    }); // Alapértelmezett kikapcsolva

    // 5. HRSZ + TELEKHATÁR (Kritikus beállítások)
    const hrszLayer = L.tileLayer(`${PROXY}/hrsz?z={z}&x={x}&y={y}&LAYER=hrsz:foldreszlet,hrsz:felirat_kat`, {
    minZoom: 15,
    maxZoom: 18,
    transparent: true,
    format: 'image/png',
    zIndex: 1000
}).addTo(map);

    // 6. RÉTEGKEZELŐ (Minden réteg ki-be kapcsolható)
    const overlays = {
        "<b style='color: #d32f2f;'>Telekhatár + HRSZ (z15+)</b>": hrszLayer,
        "<b style='color: #2d5a27;'>NTA</b>": ntaLayer,
        "<b style='color: #1976d2;'>MEPAR</b>": meparLayer
    };

    // A rétegkezelő panel fixen nyitva marad (collapsed: false)
    L.control.layers(null, overlays, { collapsed: false }).addTo(map);

    // Zoom figyelő és segítő szöveg
    map.on('zoomend', () => {
        const z = map.getZoom();
        document.getElementById('zoom-level').innerText = z;
        
        // Ha z15 alatt vagyunk, jelezzük, hogy a HRSZ nem fog látszani
        const warn = document.getElementById('hrsz-warn');
        if (z < 15) {
            warn.innerText = "HRSZ: Nagyítson z15 szintig!";
            warn.style.color = "#d32f2f";
        } else {
            warn.innerText = "HRSZ Aktív";
            warn.style.color = "#388e3c";
        }
    });
</script>
</body>
</html>
