<!DOCTYPE html>
<html>
<head>
    <title>MEPAR Topo10 Proxy Teszt (Leaflet) - VÉGLEGES</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { width: 100%; height: 100vh; }
        
        /* Információs ablak stílusa */
        .map-info {
            position: absolute;
            top: 100px; /* Hely a zoom gomboknak */
            left: 10px; 
            padding: 8px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #ccc;
            border-radius: 4px;
            z-index: 1000;
            font-size: 14px;
            line-height: 1.4;
        }
        .map-info strong {
            display: block;
            margin-bottom: 3px;
        }
    </style>
</head>
<body>

<div id="map-info" class="map-info">
    <strong>Térkép Info</strong>
    Alapréteg (OSM) Zoom: <span id="osm-zoom"></span>
    <br>
    Topo10 Zoom: <span id="topo-zoom"></span>
    <br>
    Középpont (WGS84): <span id="center-coords"></span>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // A Vercel tiles végpontja
    const TILE_URL = 'https://mepar-proxy-cli.vercel.app/api/tiles?LAYER=iier:topo10&FORMAT=image/png&TileMatrixSet=EPSG:3857&TileMatrix={z}&TileRow={y}&TileCol={x}';
    
    // 1. Térkép inicializálása
    const map = L.map('map', {
        crs: L.CRS.EPSG3857,
        // BALATON KÖZEPE
        center: [46.85, 17.85], 
        zoom: 11,
        maxZoom: 18 // 🔑 MAX ZOOM 18
    });

    // 2. Háttér réteg definiálása (70% opacitással)
    const baseLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors, &copy; <a href="https://carto.com/attributions">CARTO</a>',
        subdomains: 'abcd',
        opacity: 0.7 
    });

    // 3. A MEPAR WMTS Proxy Réteg definiálása
    const topo10Layer = L.tileLayer(TILE_URL, {
        maxZoom: 18, // 🔑 MAX ZOOM 18
        attribution: 'MEPAR/MVH/GeoServer'
    });

    // 4. Rétegek hozzáadása
    baseLayer.addTo(map); 
    topo10Layer.addTo(map);

    const baseMaps = {
        "Háttér (CartoDB 70%)": baseLayer
    };

    const overlayMaps = {
        "MEPAR Topo10": topo10Layer
    };

    // Rétegvezérlő hozzáadása
    L.control.layers(baseMaps, overlayMaps, { collapsed: false }).addTo(map);
    
    // 5. Információs ablak frissítése (Térkép Info)
    const osmZoomEl = document.getElementById('osm-zoom');
    const topoZoomEl = document.getElementById('topo-zoom');
    const centerCoordsEl = document.getElementById('center-coords');

    function updateMapInfo() {
        const currentZoom = map.getZoom();
        const center = map.getCenter();
        
        osmZoomEl.textContent = currentZoom;
        topoZoomEl.textContent = currentZoom;
        
        centerCoordsEl.textContent = `${center.lat.toFixed(4)}, ${center.lng.toFixed(4)}`;
        
        // Elugrás ellenőrzés
        if (currentZoom < 10) {
             osmZoomEl.style.color = 'red';
             topoZoomEl.style.color = 'red';
             centerCoordsEl.style.color = 'red';
        } else {
             osmZoomEl.style.color = 'black';
             topoZoomEl.style.color = 'black';
             centerCoordsEl.style.color = 'black';
        }
    }

    // Eseménykezelők a frissítéshez
    map.on('moveend', updateMapInfo);
    map.on('zoomend', updateMapInfo);
    updateMapInfo(); 
    
    // Hibakezelés (a böngésző konzoljába ír)
    topo10Layer.on('tileerror', function(e) {
        console.error('HIBA: Csempe betöltése sikertelen. Ellenőrizze a Vercel logokat!', e);
    });

</script>

</body>
</html>
