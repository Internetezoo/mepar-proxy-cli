<!DOCTYPE html>
<html>
<head>
    <title>NTA, MEPAR és HRSZ Térkép</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        body { margin: 0; padding: 0; }
        #map { width: 100%; height: 100vh; background: #e0e0e0; }
        
        .map-overlay {
            position: absolute; bottom: 20px; left: 10px; z-index: 1000;
            background: rgba(255,255,255,0.9); padding: 8px 12px;
            border-radius: 5px; font-family: sans-serif; font-size: 12px;
            border: 1px solid #ccc;
        }
        .warning { color: #d32f2f; font-weight: bold; }
    </style>
</head>
<body>

<div id="map"></div>
<div class="map-overlay">
    Zoom: <span id="zoom-level">12</span>
    <div id="hrsz-warn" class="warning">Telekhatárhoz nagyítson (z15+)!</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const PROXY = 'https://mepar-proxy-cli.vercel.app/api';

    const map = L.map('map').setView([47.16, 19.50], 12);

    // FIX ALAP: CartoDB Szürke
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; CARTO'
    }).addTo(map);

    // 1. NTA RÉTEG (Hivatalos állami alapadatok)
    const ntaLayer = L.tileLayer(`${PROXY}/nta?z={z}&x={x}&y={y}`, {
        minZoom: 8,
        opacity: 0.8,
        zIndex: 300,
        attribution: 'NTA'
    }).addTo(map);

    // 2. MEPAR RÉTEG (Blokkok és Topo)
    // Megjegyzés: Ha a fizikai_blokk nem jön be, a topo10-et használjuk alapértelmezettnek
    const meparLayer = L.tileLayer(`${PROXY}/tiles?LAYER=iier:topo10&FORMAT=image/png&TileMatrixSet=EPSG:3857&TileMatrix={z}&TileRow={y}&TileCol={x}`, {
        opacity: 0.6,
        zIndex: 200,
        attribution: 'MEPAR'
    });

    // 3. HRSZ + TELEKHATÁR
    const hrszLayer = L.tileLayer(`${PROXY}/hrsz?z={z}&x={x}&y={y}&LAYER=hrsz`, {
        minZoom: 15,
        maxZoom: 18,
        transparent: true,
        format: 'image/png',
        zIndex: 1000
    }).addTo(map);

    // RÉTEGKEZELŐ (Csak az overlay-ek)
    const overlays = {
        "<b style='color: #d32f2f;'>Telekhatár + HRSZ (z15+)</b>": hrszLayer,
        "<b style='color: #2d5a27;'>NTA Alapadatok</b>": ntaLayer,
        "<b style='color: #1976d2;'>MEPAR (Topo)</b>": meparLayer
    };

    L.control.layers(null, overlays, { collapsed: false }).addTo(map);

    // Zoom figyelés
    map.on('zoomend', () => {
        const z = map.getZoom();
        document.getElementById('zoom-level').innerText = z;
        document.getElementById('hrsz-warn').style.display = (z >= 15) ? 'none' : 'block';
    });
</script>
</body>
</html>
